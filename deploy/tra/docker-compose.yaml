services:
  # ── 人脸识别服务 ─────────────────────────────────────────────
  vrl-face:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8070:8070"
    command: uvicorn vrlFace.face_app:app --host 0.0.0.0 --port 8070 --workers 1 --log-level debug
    restart: unless-stopped
    volumes:
      - ../../models:/app/models
      - ../../data:/app/data
    env_file:
      - .env
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "4G"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── 活体检测服务 ─────────────────────────────────────────────
  vrl-liveness:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8071:8071"
    command: uvicorn vrlFace.liveness_app:app --host 0.0.0.0 --port 8071 --workers 1 --log-level debug
    restart: unless-stopped
    volumes:
      - ../../models:/app/models
      - /data/videos:/app/videos
    env_file:
      - .env
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: "4G"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8071/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
