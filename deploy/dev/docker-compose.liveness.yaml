# 活体检测服务 — 单独部署（开发环境，热重载）
# 用法：docker compose -f docker-compose.liveness.yaml up -d
#   或：bash up.sh liveness
services:
  vrl-liveness:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8071:8071"
    command: uvicorn vrlFace.apps.liveness_app:app --reload --host 0.0.0.0 --port 8071
    volumes:
      - ../..:/app
      - ../../models:/app/models
      - /data/videos:/app/videos
    env_file:
      - .env
    mem_limit: "4G"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8071/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

